name: Reusable Python CI/CD Pipeline

on:
  workflow_call:
    inputs:
      python_version:
        description: "Python Version"
        required: true
        type: string

      image_name:
        description: "Docker Image Name"
        required: true
        type: string

    secrets:
      DOCKER_USERNAME:
        required: true
      DOCKER_PASSWORD:
        required: true
      EC2_HOST:
        required: true
      EC2_USERNAME:
        required: true
      EC2_SSH_KEY:
        required: true
      SONAR_TOKEN:
        required: true

jobs:
  build-test-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python_version }}

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Debug Workspace
        run: |
          echo "===== Current Directory ====="
          pwd

          echo "===== Repository Files ====="
          ls -R

          echo "===== Python Version ====="
          python --version

          echo "===== Python Path ====="
          python -c "import sys; print(sys.path)"

          echo "===== Working Directory ====="
          python -c "import os; print(os.getcwd())"

          echo "===== Files in Root ====="
          python -c "import os; print(os.listdir())"

          echo "===== Verify app.py Exists ====="
          test -f app.py && echo "app.py found" || echo "app.py NOT found"

          echo "===== Import Test ====="
          PYTHONPATH=. python -c "import app; print(app.__file__)"

      - name: Build Validation
        run: |
          python -m compileall .
          PYTHONPATH=. python -c "from app import app; print('Import Successful')"

      - name: Run Unit Tests
        run: |
          PYTHONPATH=. pytest tests -v

      - name: Generate Coverage Report
        run: |
          PYTHONPATH=. pytest tests \
            --cov=. \
            --cov-report=xml \
            -v

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker Image
        run: |
          docker build \
            -t ${{ secrets.DOCKER_USERNAME }}/${{ inputs.image_name }}:${{ github.sha }} .

      - name: Push Docker Image
        run: |
          docker push \
            ${{ secrets.DOCKER_USERNAME }}/${{ inputs.image_name }}:${{ github.sha }}

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            echo "===== Pull Latest Image ====="
            docker pull ${{ secrets.DOCKER_USERNAME }}/${{ inputs.image_name }}:${{ github.sha }}

            echo "===== Stop Existing Container ====="
            docker stop python-app || true
            docker rm python-app || true

            echo "===== Run New Container ====="
            docker run -d \
              --name python-app \
              --restart always \
              -p 5000:5000 \
              ${{ secrets.DOCKER_USERNAME }}/${{ inputs.image_name }}:${{ github.sha }}

            echo "===== Wait for Application ====="
            sleep 10

            echo "===== Health Check ====="
            curl --fail http://localhost:5000/health

            echo "===== Deployment Successful ====="